name: Vocab
options:
  bundleIdPrefix: com.jakubsvehla
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  Vocab:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Vocab
    info:
      path: Generated/Vocab-Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jakubsvehla.vocab
        PRODUCT_NAME: Vocab
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: Vocab
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations~ipad: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    dependencies:
      - package: Supabase

  VocabTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: VocabTests
    dependencies:
      - target: Vocab
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true

schemes:
  Vocab:
    build:
      targets:
        Vocab: all
        VocabTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - VocabTests
